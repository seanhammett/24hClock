<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>24-Hour Clock</title>
  <link rel="stylesheet" href="css/newtab.css">
</head>
<body>
  <main class="clock-area">
    <svg id="clock" viewBox="0 0 440 440" role="img" aria-label="24-hour analog clock with day and night shading">
      <defs>
        <!-- The sun is drawn only where the face is in daylight and the moon
             only where it is in night, so each one is cut off by the edge of
             the slice it is crossing. daynight.js keeps both regions current. -->
        <clipPath id="clip-day">
          <path id="clip-day-path" d=""></path>
        </clipPath>
        <clipPath id="clip-night">
          <path id="clip-night-path" clip-rule="evenodd" d=""></path>
        </clipPath>
        <!-- Lit face of the moon, shaped to the current phase by moonphase.js.
             The half disc is whichever limb the sun is on; the ellipse is the
             terminator, its width falling to nothing at the quarters. Painted
             white it adds to the half (gibbous), black it bites into it
             (crescent). Both are upright in the mask's own frame, so the horns
             point straight up and down whatever the hour. -->
        <mask id="moon-crescent" maskUnits="userSpaceOnUse" x="-20" y="-20" width="40" height="40">
          <path id="moon-lit-half" d="" fill="#fff"></path>
          <ellipse id="moon-terminator" cx="0" cy="0" rx="15" ry="15" fill="#000"></ellipse>
        </mask>
      </defs>
      <!-- Base face: night is the default; the daylight wedge is painted on top -->
      <circle id="face-base" cx="220" cy="220" r="180" fill="#12233f"></circle>
      <path id="day-wedge" d="" fill="#f4f1e8" visibility="hidden"></path>
      <g id="sun-markers"></g>
      <!-- Current time, marked just outside the rim. Rotated by clock.js with
           the hour hand it echoes. -->
      <g id="now-marker">
        <circle cx="220" cy="34" r="3" class="now-marker"></circle>
      </g>
      <g id="minute-ticks"></g>
      <g id="ticks"></g>
      <!-- Two copies of the numerals, each clipped to one region, so a numeral
           straddling the day/night edge is drawn dark on the daylight side and
           light on the night side rather than picking one colour for the whole
           glyph. daynight.js sets the group fills. -->
      <g id="numerals-day" clip-path="url(#clip-day)"></g>
      <g id="numerals-night" clip-path="url(#clip-night)"></g>
      <!-- Wake/sleep lines: over the day/night fill, under the hands -->
      <g id="wake-sleep-lines"></g>
      <g id="hand-hour">
        <line x1="220" y1="238" x2="220" y2="128" stroke="#1c2742" stroke-width="9" stroke-linecap="round"></line>
        <line x1="220" y1="238" x2="220" y2="128" stroke="#f4f1e8" stroke-width="3" stroke-linecap="round"></line>
      </g>
      <!-- Sun and moon ride the hour hand, above the face and the hour hand it
           caps, but below the minute and second hands, which sweep over them.
           The clip lives on the outer group so its path stays in face
           coordinates while the inner group carries the position. -->
      <g id="hand-icons">
        <g clip-path="url(#clip-day)">
          <g id="sun-icon">
            <circle r="15" fill="#ebc363" stroke="#16233d" stroke-width="2.5"></circle>
          </g>
        </g>
        <g clip-path="url(#clip-night)">
          <g id="moon-icon">
            <!-- The dark side is painted a touch lighter than the night fill
                 rather than left transparent, so the whole disc reads against
                 the face and hides the hour hand behind it. The outline goes on
                 last so the crescent cannot cover it. -->
            <circle r="15" fill="#25395e"></circle>
            <circle r="15" fill="#f4f1e9" mask="url(#moon-crescent)"></circle>
            <circle r="15" fill="none" stroke="#16233d" stroke-width="2.5"></circle>
          </g>
        </g>
      </g>
      <g id="hand-minute">
        <line x1="220" y1="244" x2="220" y2="84" stroke="#1c2742" stroke-width="6" stroke-linecap="round"></line>
        <line x1="220" y1="244" x2="220" y2="84" stroke="#f4f1e8" stroke-width="2" stroke-linecap="round"></line>
      </g>
      <g id="hand-second">
        <line x1="220" y1="252" x2="220" y2="58" stroke="#ff6b57" stroke-width="2" stroke-linecap="round"></line>
      </g>
      <circle id="hub" cx="220" cy="220" r="7" fill="#ff6b57" stroke="#1c2742" stroke-width="2"></circle>
    </svg>
    <div class="readout">
      <div id="digital" class="digital" aria-hidden="true"><span id="digital-main"></span><span id="digital-seconds" class="digital-seconds"></span></div>
      <div id="date-readout" class="date-readout"></div>
      <div id="location-readout" class="location-readout"></div>
    </div>
  </main>

  <button id="sidebar-toggle" class="sidebar-toggle" aria-expanded="false" aria-controls="sidebar" title="Location settings">
    <span class="chevron" aria-hidden="true">&#x2039;</span>
    <span class="visually-hidden">Toggle location settings</span>
  </button>

  <aside id="sidebar" class="sidebar" aria-label="Location settings">
    <h1>Location</h1>

    <div class="field">
      <div class="place-row">
        <select id="place-select" aria-label="Place"></select>
        <button id="fav-toggle" class="fav-toggle" type="button" aria-pressed="false" title="Add to favorites" disabled>&#9734;</button>
      </div>
    </div>

    <div class="coord-row">
      <div class="field">
        <label for="lat-input">Latitude</label>
        <input type="number" id="lat-input" min="-90" max="90" step="any" placeholder="48.8566" inputmode="decimal">
      </div>
      <div class="field">
        <label for="lon-input">Longitude</label>
        <input type="number" id="lon-input" min="-180" max="180" step="any" placeholder="2.3522" inputmode="decimal">
      </div>
    </div>
    <p id="input-error" class="error" role="alert" hidden></p>

    <div id="sun-times" class="sun-times" hidden>
      <p class="sun-times-line">
        <span><span class="sun-label">Sunrise</span> <span id="sunrise-time">–</span></span>
        <span><span id="sunset-time">–</span> <span class="sun-label">Sunset</span></span>
      </p>
      <p id="polar-note" class="polar-note" hidden></p>
    </div>

    <div class="options">
      <h2>Options</h2>
      <fieldset class="option-group">
        <legend>Orientation</legend>
        <label class="checkbox-label">
          <input type="radio" name="orientation" id="orient-noon" value="noon" checked>
          12 noon at top
        </label>
        <label class="checkbox-label">
          <input type="radio" name="orientation" id="orient-centered" value="centered">
          Day &amp; night centered
        </label>
        <label class="checkbox-label">
          <input type="radio" name="orientation" id="orient-louis" value="louis">
          Louis&nbsp;XIV
        </label>
      </fieldset>
      <fieldset class="option-group">
        <legend>Clock face</legend>
        <label class="checkbox-label">
          <input type="checkbox" id="show-minute" checked>
          Show minute hand
        </label>
        <!-- Markers only mean anything with a minute hand to read against. -->
        <label class="checkbox-label checkbox-sub" id="minute-marks-row">
          <input type="checkbox" id="show-minute-marks">
          Show minute markers
        </label>
        <!-- The whole-hour ticks always stay; this is just the subdivisions. -->
        <label class="checkbox-label">
          <input type="checkbox" id="show-subhour-ticks" checked>
          Show half &amp; quarter hour ticks
        </label>
        <label class="checkbox-label">
          <input type="checkbox" id="show-second" checked>
          Show second hand
        </label>
        <label class="checkbox-label">
          <input type="checkbox" id="show-wake-sleep">
          Show wake / sleep times
        </label>
        <!-- Also shown for Louis XIV, which needs the window to orient the dial. -->
        <div id="wake-times" class="wake-times" hidden>
          <div class="field">
            <label for="wake-input">Wake up</label>
            <input type="time" id="wake-input" value="07:00">
          </div>
          <div class="field">
            <label for="bed-input">Bedtime</label>
            <input type="time" id="bed-input" value="23:00">
          </div>
        </div>
      </fieldset>
      <fieldset class="option-group">
        <legend>General</legend>
        <label class="checkbox-label">
          <input type="checkbox" id="override-newtab">
          Show the clock in every new tab
        </label>
      </fieldset>
    </div>
  </aside>

  <script src="js/suncalc.js"></script>
  <script src="js/cities.js"></script>
  <script src="js/tz-lookup.js"></script>
  <script src="js/clock.js"></script>
  <script src="js/moonphase.js"></script>
  <script src="js/daynight.js"></script>
  <script src="js/sidebar.js"></script>
</body>
</html>
